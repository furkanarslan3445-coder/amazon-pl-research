<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon PL Niche Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
  .updated { font-size: 12px; color: #8b949e; }

  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    padding: 24px 28px 0;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 20px;
  }
  .card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .card .value { font-size: 36px; font-weight: 700; color: #3fb950; }

  .panel {
    margin: 16px 28px 28px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid #30363d;
    font-size: 13px;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: .5px;
    background: #161b22;
    position: sticky;
    top: 0;
    border-bottom: 1px solid #30363d;
  }
  tbody tr { border-bottom: 1px solid #21262d; }
  tbody td { padding: 13px 16px; font-size: 13px; vertical-align: top; }
  .kw { font-weight: 500; color: #e6edf3; }
  .price { color: #3fb950; font-weight: 600; }
  .ratio { color: #58a6ff; font-weight: 600; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: #1a4a2e;
    color: #3fb950;
    border: 1px solid #2ea043;
  }
  .empty { padding: 60px; text-align: center; color: #8b949e; font-size: 14px; }
  .loading { padding: 60px; text-align: center; color: #8b949e; font-size: 14px; }

  .kw-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .rating-dot { font-size: 16px; }

  .comment-btn {
    background: none;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    margin-top: 6px;
  }
  .comment-btn:hover { border-color: #58a6ff; color: #58a6ff; }

  .comment-panel {
    display: none;
    margin-top: 10px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px;
  }
  .comment-item {
    padding: 8px 0;
    border-bottom: 1px solid #21262d;
    font-size: 12px;
  }
  .comment-item:last-child { border-bottom: none; }
  .comment-author { color: #58a6ff; font-weight: 600; margin-right: 6px; }
  .comment-text { color: #e6edf3; }
  .comment-date { color: #8b949e; font-size: 11px; margin-top: 2px; }

  .rating-btns { display: flex; gap: 6px; margin-bottom: 8px; }
  .rating-btn {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 16px;
    cursor: pointer;
    transition: all .15s;
  }
  .rating-btn:hover { border-color: #8b949e; }
  .rating-btn.selected-good { border-color: #3fb950; background: #1a4a2e; }
  .rating-btn.selected-mid  { border-color: #d29922; background: #2d2209; }
  .rating-btn.selected-bad  { border-color: #f85149; background: #3d1212; }

  .comment-form { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .comment-form input {
    background: #161b22;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
  }
  .comment-form input:focus { border-color: #58a6ff; }
  .comment-form input[name="author"] { width: 100px; }
  .comment-form input[name="text"] { flex: 1; min-width: 150px; }
  .comment-form button {
    background: #238636;
    border: none;
    color: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .comment-form button:hover { background: #2ea043; }
</style>
</head>
<body>

<header>
  <h1>Amazon PL Niche Araştırma</h1>
  <span class="updated" id="updated"></span>
</header>

<div class="stats">
  <div class="card">
    <div class="label">Toplam Fırsat</div>
    <div class="value" id="total">—</div>
  </div>
  <div class="card">
    <div class="label">En Son Bulunan</div>
    <div class="value" style="font-size:16px; padding-top:8px;" id="last-kw">—</div>
  </div>
</div>

<div class="panel">
  <div class="panel-header">Fırsatlar</div>
  <div id="content" class="loading">Yükleniyor...</div>
</div>

<script>
  const SUPABASE_URL = "https://hliybyotbqhshurwmaqu.supabase.co";
  const SUPABASE_KEY = "sb_publishable_DzuqlltfR23UDDMXetIQ2Q_T0GMoOOj";
  const JSON_URL = "https://raw.githubusercontent.com/furkanarslan3445-coder/amazon-pl-research/main/output/opportunities.json";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let allComments = {};
  let selectedRatings = {};

  async function loadComments() {
    const { data } = await sb.from("comments").select("*").order("created_at", { ascending: true });
    allComments = {};
    if (data) {
      data.forEach(c => {
        if (!allComments[c.keyword]) allComments[c.keyword] = [];
        allComments[c.keyword].push(c);
      });
    }
  }

  function getLastRating(kw) {
    const comments = allComments[kw] || [];
    const withRating = comments.filter(c => c.rating);
    if (withRating.length === 0) return null;
    return withRating[withRating.length - 1].rating;
  }

  function ratingDot(rating) {
    if (rating === 'good') return '<span class="rating-dot" title="Olumlu">🟢</span>';
    if (rating === 'mid')  return '<span class="rating-dot" title="Kararsız">🟡</span>';
    if (rating === 'bad')  return '<span class="rating-dot" title="Olumsuz">🔴</span>';
    return '';
  }

  function toggleComments(kw) {
    const panel = document.getElementById("cp_" + btoa(unescape(encodeURIComponent(kw))).replace(/=/g,""));
    if (!panel) return;
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  }

  function selectRating(kw, rating, btn) {
    selectedRatings[kw] = rating;
    const btns = btn.closest('.rating-btns').querySelectorAll('.rating-btn');
    btns.forEach(b => b.className = 'rating-btn');
    if (rating === 'good') btn.classList.add('selected-good');
    if (rating === 'mid')  btn.classList.add('selected-mid');
    if (rating === 'bad')  btn.classList.add('selected-bad');
  }

  async function addComment(kw, author, text, rating) {
    if (!author.trim()) return;
    await sb.from("comments").insert({
      keyword: kw,
      author: author.trim(),
      comment: text.trim(),
      rating: rating || null
    });
    await loadComments();
    renderCommentPanel(kw);
    // Rating dot güncelle
    const id = "dot_" + btoa(unescape(encodeURIComponent(kw))).replace(/=/g,"");
    const dotEl = document.getElementById(id);
    if (dotEl) dotEl.innerHTML = ratingDot(getLastRating(kw));
  }

  function renderCommentPanel(kw) {
    const id = "cp_" + btoa(unescape(encodeURIComponent(kw))).replace(/=/g,"");
    const panel = document.getElementById(id);
    if (!panel) return;
    const comments = allComments[kw] || [];
    const list = comments.map(c => `
      <div class="comment-item">
        <span class="comment-author">${c.author}</span>
        ${c.rating ? ratingDot(c.rating) : ''}
        <span class="comment-text">${c.comment}</span>
        <div class="comment-date">${new Date(c.created_at).toLocaleString('tr-TR')}</div>
      </div>
    `).join('') || '<div style="color:#8b949e;font-size:12px;padding:4px 0">Henüz yorum yok.</div>';

    const kwEsc = kw.replace(/'/g,"\\'");
    panel.innerHTML = `
      <div>${list}</div>
      <div class="rating-btns">
        <button class="rating-btn" onclick="selectRating('${kwEsc}', 'good', this)">✅</button>
        <button class="rating-btn" onclick="selectRating('${kwEsc}', 'mid', this)">➖</button>
        <button class="rating-btn" onclick="selectRating('${kwEsc}', 'bad', this)">❌</button>
      </div>
      <div class="comment-form">
        <input name="author" placeholder="İsmin" />
        <input name="text" placeholder="Yorum yaz... (opsiyonel)" />
        <button onclick="submitComment('${kwEsc}', this)">Gönder</button>
      </div>
    `;
  }

  async function submitComment(kw, btn) {
    const form = btn.closest(".comment-form");
    const author = form.querySelector("[name=author]").value;
    const text = form.querySelector("[name=text]").value;
    const rating = selectedRatings[kw] || null;
    if (!author.trim()) { alert('İsmini yaz!'); return; }
    btn.disabled = true;
    btn.textContent = "...";
    await addComment(kw, author, text, rating);
    selectedRatings[kw] = null;
    btn.disabled = false;
    btn.textContent = "Gönder";
    // Paneli kapat
    const id = "cp_" + btoa(unescape(encodeURIComponent(kw))).replace(/=/g,"");
    const panel = document.getElementById(id);
    if (panel) panel.style.display = "none";
  }

  async function load() {
    try {
      const r = await fetch(JSON_URL + "?t=" + Date.now());
      const data = await r.json();
      await loadComments();

      document.getElementById('total').textContent = data.length;
      document.getElementById('last-kw').textContent = data.length > 0 ? data[data.length-1].keyword : '—';
      document.getElementById('updated').textContent = 'Son yenileme: ' + new Date().toLocaleTimeString('tr-TR');

      if (data.length === 0) {
        document.getElementById('content').innerHTML = '<div class="empty">Henüz fırsat bulunamadı...</div>';
        return;
      }

      const rows = [...data].reverse().map(o => {
        const id = btoa(unescape(encodeURIComponent(o.keyword))).replace(/=/g,"");
        const commentCount = (allComments[o.keyword] || []).length;
        const lastRating = getLastRating(o.keyword);
        return `
          <tr>
            <td class="kw">
              <div class="kw-row">
                <a href="https://www.amazon.com/s?k=${encodeURIComponent(o.keyword)}" target="_blank" style="color:#58a6ff;text-decoration:none;">${o.keyword}</a>
                <span id="dot_${id}">${ratingDot(lastRating)}</span>
              </div>
              <button class="comment-btn" onclick="toggleComments('${o.keyword.replace(/'/g,"\\'")}'); renderCommentPanel('${o.keyword.replace(/'/g,"\\'")}')">
                Feedback${commentCount > 0 ? ' (' + commentCount + ')' : ''}
              </button>
              <div class="comment-panel" id="cp_${id}"></div>
            </td>
            <td>${o.product_count}</td>
            <td class="price">${o.avg_price}</td>
            <td>${o.opportunity_count}</td>
            <td class="ratio">${o.ratio}</td>
            <td><span class="badge">✅ GİRİLEBİLİR</span></td>
          </tr>
        `;
      }).join('');

      document.getElementById('content').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Keyword</th>
              <th>Ürün Sayısı</th>
              <th>Ort. Fiyat</th>
              <th>Uygun Ürün</th>
              <th>Oran</th>
              <th>Durum</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch(e) {
      document.getElementById('content').innerHTML = '<div class="empty">Veri yüklenemedi.</div>';
    }
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
