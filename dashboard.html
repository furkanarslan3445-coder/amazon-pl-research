<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon PL Niche Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #3fb950; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 16px;
    padding: 24px 28px 0;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 20px;
  }
  .card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .card .value { font-size: 32px; font-weight: 700; }
  .card.green .value { color: #3fb950; }
  .card.blue .value { color: #58a6ff; }
  .card.yellow .value { color: #d29922; }
  .card.purple .value { color: #bc8cff; }

  .bottom {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 16px;
    padding: 16px 28px 28px;
  }

  .panel {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid #30363d;
    font-size: 13px;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* Taranan keywordler */
  .scan-list {
    height: 480px;
    overflow-y: auto;
    padding: 8px 0;
  }
  .scan-list::-webkit-scrollbar { width: 4px; }
  .scan-list::-webkit-scrollbar-track { background: transparent; }
  .scan-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
  .scan-item {
    padding: 7px 18px;
    font-size: 12px;
    color: #8b949e;
    border-bottom: 1px solid #21262d;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scan-item:first-child { color: #e6edf3; font-weight: 500; }
  .scan-item:first-child::before { content: "▶ "; color: #3fb950; }

  /* Fırsatlar tablosu */
  .opp-list {
    height: 480px;
    overflow-y: auto;
  }
  .opp-list::-webkit-scrollbar { width: 4px; }
  .opp-list::-webkit-scrollbar-track { background: transparent; }
  .opp-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: .5px;
    background: #161b22;
    position: sticky;
    top: 0;
    border-bottom: 1px solid #30363d;
  }
  tbody tr { border-bottom: 1px solid #21262d; transition: background .15s; }
  tbody tr:hover { background: #1c2128; }
  tbody td { padding: 12px 16px; font-size: 13px; }
  .kw { font-weight: 500; color: #e6edf3; max-width: 260px; }
  .price { color: #3fb950; font-weight: 600; }
  .ratio { color: #58a6ff; font-weight: 600; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: #1a4a2e;
    color: #3fb950;
    border: 1px solid #2ea043;
  }
  .empty { padding: 40px; text-align: center; color: #8b949e; font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>Amazon PL Niche Araştırma</h1>
</header>

<div class="grid">
  <div class="card blue">
    <div class="label">Toplam Keyword</div>
    <div class="value" id="total">—</div>
  </div>
  <div class="card yellow">
    <div class="label">Taranan</div>
    <div class="value" id="scanned">—</div>
  </div>
  <div class="card purple">
    <div class="label">Kalan</div>
    <div class="value" id="remaining">—</div>
  </div>
  <div class="card green">
    <div class="label">Fırsat Bulundu</div>
    <div class="value" id="opportunities">—</div>
  </div>
</div>

<div class="bottom">
  <div class="panel">
    <div class="panel-header">Taranan Keywordler</div>
    <div class="scan-list" id="scan-list"></div>
  </div>
  <div class="panel">
    <div class="panel-header">Fırsatlar ✅</div>
    <div class="opp-list">
      <table>
        <thead>
          <tr>
            <th>Keyword</th>
            <th>Ürün</th>
            <th>Ort. Fiyat</th>
            <th>Uygun</th>
            <th>Oran</th>
            <th>Durum</th>
          </tr>
        </thead>
        <tbody id="opp-table"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  async function fetchStats() {
    try {
      const r = await fetch('/api/stats');
      const d = await r.json();
      document.getElementById('total').textContent = d.total.toLocaleString();
      document.getElementById('scanned').textContent = d.scanned.toLocaleString();
      document.getElementById('remaining').textContent = d.remaining.toLocaleString();
      document.getElementById('opportunities').textContent = d.opportunities.toLocaleString();
    } catch(e) {}
  }

  async function fetchRecent() {
    try {
      const r = await fetch('/api/recent');
      const d = await r.json();
      const list = document.getElementById('scan-list');
      list.innerHTML = d.map((kw, i) =>
        `<div class="scan-item">${kw}</div>`
      ).join('');
    } catch(e) {}
  }

  async function fetchOpportunities() {
    try {
      const r = await fetch('/api/opportunities');
      const d = await r.json();
      const tbody = document.getElementById('opp-table');
      if (d.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Henüz fırsat bulunamadı...</td></tr>';
        return;
      }
      tbody.innerHTML = d.reverse().map(o => `
        <tr>
          <td class="kw">${o.keyword}</td>
          <td>${o.product_count}</td>
          <td class="price">${o.avg_price}</td>
          <td>${o.opportunity_count}</td>
          <td class="ratio">${o.ratio}</td>
          <td><span class="badge">✅ GİRİLEBİLİR</span></td>
        </tr>
      `).join('');
    } catch(e) {}
  }

  function refresh() {
    fetchStats();
    fetchRecent();
    fetchOpportunities();
  }

  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
